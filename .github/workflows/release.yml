name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: windows
            arch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Build
        run: |
          suffix=""
          [ "${{ matrix.os }}" = "windows" ] && suffix=".exe"
          version="${GITHUB_REF#refs/tags/}"
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build \
            -ldflags "-s -w -X main.version=${version}" \
            -o "ailinter_${version}_${{ matrix.os }}_${{ matrix.arch }}${suffix}" \
            ./cmd/ailinter
      - name: Checksum
        run: |
          version="${GITHUB_REF#refs/tags/}"
          suffix=""
          [ "${{ matrix.os }}" = "windows" ] && suffix=".exe"
          cd "${{ github.workspace }}"
          sha256sum "ailinter_${version}_${{ matrix.os }}_${{ matrix.arch }}${suffix}" > \
            "ailinter_${version}_${{ matrix.os }}_${{ matrix.arch }}${suffix}.sha256"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ailinter-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            ailinter_*_${{ matrix.os }}_${{ matrix.arch }}
            ailinter_*_${{ matrix.os }}_${{ matrix.arch }}.sha256

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
