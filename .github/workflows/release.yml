name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: windows
            arch: amd64
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Build
        run: |
          suffix=""
          [ "${{ matrix.os }}" = "windows" ] && suffix=".exe"
          version="${GITHUB_REF#refs/tags/}"
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build \
            -ldflags "-s -w -X main.version=${version}" \
            -o "ailinter_${version}_${{ matrix.os }}_${{ matrix.arch }}${suffix}" \
            ./cmd/ailinter
          sha256sum "ailinter_${version}_${{ matrix.os }}_${{ matrix.arch }}${suffix}" > \
            "ailinter_${version}_${{ matrix.os }}_${{ matrix.arch }}${suffix}.sha256"
      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ailinter_*_${{ matrix.os }}_${{ matrix.arch }}*
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
