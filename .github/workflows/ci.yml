name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go fmt check
        run: |
          fmt=$(go fmt ./...)
          if [ -n "$fmt" ]; then echo "$fmt"; exit 1; fi

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      - name: Build binary (for integration tests)
        run: mkdir -p bin && go build -o bin/ailinter ./cmd/ailinter
      - name: Run tests
        run: go test $(go list ./... | grep -v -E '/(scripts|cmd)/') -v -count=1 -coverprofile=coverage.out -covermode=count
      - name: Check line coverage
        run: |
          coverage=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | sed 's/%//')
          echo "Line coverage: ${coverage}%"
          if (( $(echo "$coverage < 80" | bc -l) )); then
            echo "❌ Line coverage below 80%: ${coverage}%"
            exit 1
          fi
          echo "✅ Line coverage gate passed (≥80%)"
      - name: Check function coverage
        run: |
          func_cov=$(awk '!/total:/ && /[0-9]+\.[0-9]+%$/ {
            total++;
            if ($NF == "0.0%") uncovered++
          } END {
            if (total > 0) printf "%.0f", (total-uncovered)/total*100;
            else print "0"
          }' coverage.out.func 2>/dev/null || go tool cover -func=coverage.out | awk '!/total:/ && /[0-9]+\.[0-9]+%$/ { total++; if ($NF == "0.0%") uncovered++ } END { if (total > 0) printf "%.0f", (total-uncovered)/total*100; else print "0" }')
          echo "Function coverage: ${func_cov}%"
          if [ "$func_cov" -lt 70 ]; then
            echo "❌ Function coverage below 70%: ${func_cov}%"
            echo "Uncovered functions:"
            go tool cover -func=coverage.out | awk '$NF == "0.0%" && !/total:/ { print "  " $1, $2 }'
            exit 1
          fi
          echo "✅ Function coverage gate passed (≥70%)"
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      - name: Build
        run: go build -ldflags "-X main.version=${{ github.ref_name }}" -o bin/ailinter ./cmd/ailinter
      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: ailinter-linux-amd64
          path: bin/ailinter

  cross-build:
    name: Cross-build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: linux
            arch: arm64
          - os: windows
            arch: amd64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      - name: Cross-build
        run: |
          suffix=""
          [ "${{ matrix.os }}" = "windows" ] && suffix=".exe"
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build \
            -ldflags "-X main.version=${{ github.ref_name }}" \
            -o bin/ailinter-${{ matrix.os }}-${{ matrix.arch }}$suffix \
            ./cmd/ailinter
      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: ailinter-${{ matrix.os }}-${{ matrix.arch }}
          path: bin/ailinter-${{ matrix.os }}-${{ matrix.arch }}*

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      - name: Run benchmarks
        run: go test ./internal/... -bench=. -benchmem -count=3 | tee benchmark.txt
      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks
          path: benchmark.txt
