# ailinter configuration
# Copy this file to your project root as .ailinter.toml to customize thresholds.
# Generated by: ailinter init

extends = "default"

[rules]
# --- Nesting ---
deep_nesting = { weight = 1.0, warning = 4, alert = 5 }

# --- Function size ---
brain_method = { weight = 1.0, warning_lines = 80, alert_lines = 300 }

# --- File size ---
file_bloat = { weight = 1.0, warning_lines = 1000, alert_lines = 2000 }

# --- Complexity ---
complex_conditional = { weight = 1.0, branches_warning = 2, branches_alert = 10 }
cyclomatic_complexity = { weight = 1.0, warning = 9, alert = 20 }

# --- Bumpy Road ---
bumpy_road = { weight = 1.0, bumps_warning = 2, bump_depth = 2 }

# --- Parameters ---
long_parameter_list = { weight = 1.0, warning = 4, alert = 7 }

# --- Other structural ---
lazy_element = { min_lines = 3 }
paragraph_of_code = { max_consecutive = 20 }
message_chains = { min_chains = 2 }
primitive_obsession = { min_primitives = 4 }

# --- Comments ---
excessive_comments = { ratio = 0.3 }

# --- Global state ---
global_data = { warning = 5 }
long_scope_variable = { min_lines = 50 }

# --- Duplication ---
duplicated_code = { min_lines = 10, min_similarity = 0.75 }

# --- Switch ---
long_switch = { warning = 10, alert = 20 }

# Secret scanning via gitleaks
[gitleaks]
extend = "default"

# MCP server options
[mcp]
enabled_tools = ["*"]
read_only = false
